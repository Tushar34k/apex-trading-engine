spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/tradeengine}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  flyway:
    enabled: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-256-bits-long-secret-key}
  expiration: 86400000

encryption:
  aes-key: ${AES_KEY:change-me-32-char-aes-key-here!}

exchange:
  binance:
    base-url: ${BINANCE_BASE_URL:https://testnet.binance.vision}
    live-url: ${BINANCE_LIVE_URL:https://api.binance.com}
    testnet-url: ${BINANCE_TESTNET_URL:https://testnet.binance.vision}
    recv-window: 5000

  delta:
    base-url: ${DELTA_BASE_URL:https://cdn-ind.testnet.deltaex.org}
    live-url: ${DELTA_LIVE_URL:https://api.delta.exchange}
    testnet-url: ${DELTA_TESTNET_URL:https://cdn-ind.testnet.deltaex.org}

  bybit:
    base-url: ${BYBIT_BASE_URL:https://api-testnet.bybit.com}
    live-url: ${BYBIT_LIVE_URL:https://api.bybit.com}
    testnet-url: ${BYBIT_TESTNET_URL:https://api-testnet.bybit.com}

live-trading:
  enabled: ${LIVE_TRADING_ENABLED:false}

symbols:
  mappings:
    "BTC/USDT":
      binance: BTCUSDT
      delta: BTCUSD
      bybit: BTCUSDT
    "ETH/USDT":
      binance: ETHUSDT
      delta: ETHUSD
      bybit: ETHUSDT
    "SOL/USDT":
      binance: SOLUSDT
      delta: SOLUSD
      bybit: SOLUSDT
    "XRP/USDT":
      binance: XRPUSDT
      delta: XRPUSD
      bybit: XRPUSDT
    "DOGE/USDT":
      binance: DOGEUSDT
      delta: DOGEUSD
      bybit: DOGEUSDT
    "AVAX/USDT":
      binance: AVAXUSDT
      delta: AVAXUSD
      bybit: AVAXUSDT
    "LINK/USDT":
      binance: LINKUSDT
      delta: LINKUSD
      bybit: LINKUSDT
    "MATIC/USDT":
      binance: MATICUSDT
      delta: MATICUSD
      bybit: MATICUSDT
    "ADA/USDT":
      binance: ADAUSDT
      delta: ADAUSD
      bybit: ADAUSDT
    "DOT/USDT":
      binance: DOTUSDT
      delta: DOTUSD
      bybit: DOTUSDT

logging:
  level:
    com.tradeengine: INFO
